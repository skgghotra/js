<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="parent">
    <div class="week">monday</div>
    <div class="week">tuesday</div>
    <div class="week">wednesday</div>
    <div class="week">thursday</div>
    <div class="week">friday</div>
    </div>
<script>
    const parent=document.querySelector('.parent');
console.log(parent);
console.log(parent.children);
console.log(parent.children[0]);
console.log(parent.children[1].innerHTML);

for(let i=0; i<parent.children.length; i++){
    console.log(parent.children[i].innerHTML);
}

parent.children[0].style.color='red';
console.log(parent.firstElementChild);
console.log(parent.lastElementChild);

const day=document.querySelector('.week');
console.log(day);
console.log(day.parentElement);
console.log(day.nextElementSibling);

console.log("NODES : ",parent.childNodes);

const div=document.createElement('div');
console.log(div);
div.className='work';
div.id=Math.round(Math.random()*1000+2);
div.style.color='purple';
div.style.backgroundColor='yellow';

const addText=document.createTextNode('hello world');
div.appendChild(addText);
console.log(div);

document.body.appendChild(div);
</script>
</body>
</html>
